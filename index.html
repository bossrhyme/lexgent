<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexis — Hukuk Bürosu Yönetimi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0b0d;--surface:#111316;--surface2:#191c22;--border:#242830;--accent:#c9a84c;--accent2:#e8c97a;--accent-dim:rgba(201,168,76,0.12);--text:#ede9e0;--muted:#6b6f7a;--danger:#e05555;--ok:#4caf82}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;cursor:none}
.cursor{position:fixed;width:8px;height:8px;background:var(--accent);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .1s,width .2s,height .2s}
.cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(201,168,76,.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform .15s ease-out,width .25s,height .25s,border-color .2s}
body::before{content:'';position:fixed;inset:0;z-index:1000;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");opacity:.4}
.lang-toggle{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:20px;overflow:hidden;flex-shrink:0}
.lang-btn{padding:5px 13px;font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s;letter-spacing:.5px}
.lang-btn.active{background:var(--accent);color:#0a0b0d;font-weight:600}
nav{position:fixed;top:0;left:0;right:0;z-index:500;padding:0 48px;height:68px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid transparent;transition:all .3s}
nav.scrolled{background:rgba(10,11,13,.9);border-bottom-color:var(--border);backdrop-filter:blur(16px)}
.nav-logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--accent);letter-spacing:1.5px;font-weight:700;text-decoration:none}
.nav-links{display:flex;gap:32px;align-items:center}
.nav-links a{color:var(--muted);font-size:13px;text-decoration:none;letter-spacing:.5px;font-family:'DM Mono',monospace;transition:color .2s}
.nav-links a:hover{color:var(--text)}
.nav-cta{display:flex;gap:10px;align-items:center}
.btn{padding:9px 20px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#0a0b0d;font-weight:600}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,.25)}
.btn-lg{padding:14px 32px;font-size:15px;border-radius:8px}
.hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:120px 48px 80px;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-glow{position:absolute;top:-10%;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,rgba(201,168,76,.08) 0%,transparent 70%);pointer-events:none}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.03) 1px,transparent 1px);background-size:80px 80px;mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,black,transparent)}
.hero-content{position:relative;z-index:1;text-align:center;max-width:860px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border:1px solid rgba(201,168,76,.25);border-radius:20px;font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:1.5px;margin-bottom:32px;background:rgba(201,168,76,.05);animation:fadeUp .6s ease both}
.hero-badge::before{content:'';width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(48px,7vw,88px);line-height:1.05;font-weight:900;letter-spacing:-1px;margin-bottom:24px;animation:fadeUp .7s .1s ease both}
.hero-title em{font-style:italic;color:var(--accent)}
.hero-title .line2{display:block;color:var(--muted);font-weight:400;font-size:.72em}
.hero-sub{font-size:17px;color:var(--muted);line-height:1.7;max-width:560px;margin:0 auto 48px;animation:fadeUp .7s .2s ease both;font-weight:300}
.hero-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;animation:fadeUp .7s .3s ease both}
.hero-stats{display:flex;gap:48px;justify-content:center;margin-top:72px;animation:fadeUp .7s .5s ease both}
.stat{text-align:center}.stat-num{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:var(--accent)}
.stat-label{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1px;margin-top:4px}
.stat-divider{width:1px;background:var(--border)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.scroll-hint{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;animation:fadeUp .7s .8s ease both;opacity:0}
.scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,var(--accent),transparent);animation:scrollPulse 2s infinite}
@keyframes scrollPulse{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform:scaleY(1);transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}
.scroll-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px}
.marquee-section{border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:16px 0;overflow:hidden;background:var(--surface)}
.marquee-track{display:flex;width:max-content;animation:marquee 30s linear infinite}
.marquee-item{display:flex;align-items:center;gap:16px;padding:0 32px;white-space:nowrap;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:1px}
.marquee-dot{width:4px;height:4px;background:var(--accent);border-radius:50%;flex-shrink:0}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.section{padding:120px 48px}
.section-tag{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(32px,4vw,52px);line-height:1.15;font-weight:700;margin-bottom:20px}
.section-sub{font-size:16px;color:var(--muted);line-height:1.7;max-width:520px;font-weight:300}
.features-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:72px;background:var(--border)}
.feature{background:var(--bg);padding:48px;transition:background .2s;position:relative;overflow:hidden}
.feature::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent-dim),transparent);opacity:0;transition:opacity .3s}
.feature:hover::before{opacity:1}.feature:hover{background:var(--surface)}
.feat-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:2px;margin-bottom:20px}
.feat-icon{width:48px;height:48px;border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:24px;transition:border-color .2s}
.feature:hover .feat-icon{border-color:var(--accent)}
.feat-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;margin-bottom:12px}
.feat-desc{font-size:14px;color:var(--muted);line-height:1.7;font-weight:300}
.preview-section{padding:80px 48px 120px;text-align:center}
.preview-wrap{position:relative;max-width:1000px;margin:64px auto 0;border-radius:12px;overflow:hidden;border:1px solid var(--border);box-shadow:0 40px 120px rgba(0,0,0,.6)}
.preview-bar{background:var(--surface);padding:14px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.dot-row{display:flex;gap:7px}.dot{width:12px;height:12px;border-radius:50%}
.d1{background:#e05555}.d2{background:#e09a35}.d3{background:#4caf82}
.preview-url{flex:1;text-align:center;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
.preview-body{background:var(--surface2);display:grid;grid-template-columns:220px 1fr;min-height:380px}
.p-sidebar{background:var(--surface);border-right:1px solid var(--border);padding:20px 0}
.p-logo{padding:0 20px 16px;border-bottom:1px solid var(--border);font-family:'Playfair Display',serif;font-size:16px;color:var(--accent)}
.p-nav-item{padding:10px 20px;font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:8px}
.p-nav-item.act{color:var(--accent);background:rgba(201,168,76,.06);border-left:2px solid var(--accent)}
.p-main{padding:24px}.p-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.p-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.p-card-name{font-family:'Playfair Display',serif;font-size:13px;margin-bottom:6px}
.p-card-meta{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
.p-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:9px;font-family:'DM Mono',monospace;margin-top:6px}
.pb-warn{background:rgba(224,154,53,.15);color:#e09a35;border:1px solid rgba(224,154,53,.3)}
.pb-ok{background:rgba(76,175,130,.15);color:#4caf82;border:1px solid rgba(76,175,130,.3)}
.pb-info{background:rgba(201,168,76,.1);color:var(--accent);border:1px solid rgba(201,168,76,.2)}
.p-warn-bar{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px}
.p-warn-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.p-warn-row:last-child{border:none}
.p-warn-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.wd-high{background:#e05555}.wd-med{background:#e09a35}
.p-warn-text{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;flex:1}
.p-warn-days{font-size:10px;color:var(--accent);font-family:'DM Mono',monospace}
.preview-glow{position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(to top,var(--bg),transparent);pointer-events:none}
.steps-section{padding:120px 48px;background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:48px;margin-top:72px}
.step-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:2px;margin-bottom:20px}
.step-icon{width:56px;height:56px;border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:24px;background:var(--surface2)}
.step-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;margin-bottom:12px}
.step-desc{font-size:14px;color:var(--muted);line-height:1.7}
.testimonials{padding:120px 48px;text-align:center}
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:64px;text-align:left}
.testi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:32px;transition:border-color .2s}
.testi-card:hover{border-color:rgba(201,168,76,.3)}
.testi-quote{font-size:28px;color:var(--accent);margin-bottom:16px;font-family:'Playfair Display',serif;line-height:1}
.testi-text{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:24px;font-style:italic;font-family:'Playfair Display',serif}
.testi-author{display:flex;align-items:center;gap:12px}
.testi-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#6b4f0f);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:14px;color:#0a0b0d;font-weight:700}
.testi-name{font-size:13px;font-weight:500}
.testi-role{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
.testi-stars{display:flex;gap:3px;margin-bottom:16px}.star{color:var(--accent);font-size:13px}
.cta-section{padding:120px 48px;text-align:center;position:relative;overflow:hidden}
.cta-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:300px;background:radial-gradient(ellipse,rgba(201,168,76,.1),transparent 70%);pointer-events:none}
.cta-title{font-family:'Playfair Display',serif;font-size:clamp(36px,5vw,64px);font-weight:900;line-height:1.1;margin-bottom:20px;position:relative;z-index:1}
.cta-title em{font-style:italic;color:var(--accent)}
.cta-sub{font-size:16px;color:var(--muted);margin-bottom:48px;position:relative;z-index:1;font-weight:300}
.cta-actions{display:flex;gap:14px;justify-content:center;position:relative;z-index:1}
.cta-note{margin-top:16px;font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.5px;position:relative;z-index:1}
footer{background:var(--surface);border-top:1px solid var(--border);padding:64px 48px 32px}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;margin-bottom:48px}
.footer-brand p{font-family:'Playfair Display',serif;font-size:20px;color:var(--accent);font-weight:700;margin-bottom:12px}
.footer-brand span{font-size:13px;color:var(--muted);line-height:1.7;max-width:240px;display:block;font-weight:300}
.footer-col h4{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.footer-col a{display:block;font-size:13px;color:var(--muted);text-decoration:none;margin-bottom:10px;transition:color .2s}
.footer-col a:hover{color:var(--accent)}
.footer-bottom{border-top:1px solid var(--border);padding-top:24px;display:flex;justify-content:space-between;align-items:center}
.footer-bottom p{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
.footer-socials{display:flex;gap:16px}
.social-link{width:32px;height:32px;border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted);text-decoration:none;font-size:13px;transition:all .2s}
.social-link:hover{border-color:var(--accent);color:var(--accent)}
.reveal{opacity:0;transform:translateY(30px);transition:opacity .7s,transform .7s}
.reveal.visible{opacity:1;transform:translateY(0)}
@media(max-width:768px){nav{padding:0 16px}.nav-links{display:none}.hero{padding:120px 20px 80px}.hero-stats{gap:24px}.section{padding:80px 20px}.features-grid{grid-template-columns:1fr}.steps-grid{grid-template-columns:1fr}.testi-grid{grid-template-columns:1fr}.footer-grid{grid-template-columns:1fr 1fr}footer{padding:48px 20px 24px}}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursor-ring"></div>

<nav id="navbar">
  <a href="index.html" class="nav-logo">LEXIS</a>
  <div class="nav-links">
    <a href="#features" data-i18n="nav_features"></a>
    <a href="#how" data-i18n="nav_how"></a>
    <a href="pricing.html" data-i18n="nav_pricing"></a>
  </div>
  <div class="nav-cta">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-tr" onclick="setLang('tr')">TR</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <a href="login.html" class="btn btn-ghost" data-i18n="nav_signin"></a>
    <a href="pricing.html" class="btn btn-primary" data-i18n="nav_getstarted"></a>
  </div>
</nav>

<section class="hero" id="hero">
  <div class="hero-bg"><div class="hero-glow"></div><div class="hero-grid"></div></div>
  <div class="hero-content">
    <div class="hero-badge" data-i18n="hero_badge"></div>
    <h1 class="hero-title">
      <span data-i18n="hero_title1"></span>
      <em data-i18n="hero_title2"></em>
      <span class="line2" data-i18n="hero_title3"></span>
    </h1>
    <p class="hero-sub" data-i18n="hero_sub"></p>
    <div class="hero-actions">
      <a href="pricing.html" class="btn btn-primary btn-lg" data-i18n="hero_trial"></a>
      <a href="#features" class="btn btn-ghost btn-lg" data-i18n="hero_see_feat"></a>
    </div>
    <div class="hero-stats">
      <div class="stat"><div class="stat-num">2.400+</div><div class="stat-label" data-i18n="stat_firms"></div></div>
      <div class="stat-divider"></div>
      <div class="stat"><div class="stat-num">98%</div><div class="stat-label" data-i18n="stat_retention"></div></div>
      <div class="stat-divider"></div>
      <div class="stat"><div class="stat-num" data-i18n="stat_setup_num"></div><div class="stat-label" data-i18n="stat_setup"></div></div>
    </div>
  </div>
  <div class="scroll-hint"><span class="scroll-label" data-i18n="scroll"></span><div class="scroll-line"></div></div>
</section>

<div class="marquee-section"><div class="marquee-track" id="marquee"></div></div>

<section class="section" id="features">
  <div class="reveal">
    <div class="section-tag" data-i18n="feat_tag"></div>
    <h2 class="section-title"><span data-i18n="feat_h1"></span><br><em style="color:var(--accent)" data-i18n="feat_h2"></em></h2>
    <p class="section-sub" data-i18n="feat_sub"></p>
  </div>
  <div class="features-grid reveal">
    <div class="feature"><div class="feat-num">01</div><div class="feat-icon">⚖</div><div class="feat-title" data-i18n="f1t"></div><div class="feat-desc" data-i18n="f1d"></div></div>
    <div class="feature"><div class="feat-num">02</div><div class="feat-icon">📁</div><div class="feat-title" data-i18n="f2t"></div><div class="feat-desc" data-i18n="f2d"></div></div>
    <div class="feature"><div class="feat-num">03</div><div class="feat-icon">⚠</div><div class="feat-title" data-i18n="f3t"></div><div class="feat-desc" data-i18n="f3d"></div></div>
    <div class="feature"><div class="feat-num">04</div><div class="feat-icon">📅</div><div class="feat-title" data-i18n="f4t"></div><div class="feat-desc" data-i18n="f4d"></div></div>
  </div>
</section>

<section class="preview-section reveal">
  <div class="section-tag" data-i18n="prev_tag"></div>
  <h2 class="section-title"><span data-i18n="prev_h1"></span><br><em style="color:var(--accent)" data-i18n="prev_h2"></em></h2>
  <p class="section-sub" style="margin:0 auto" data-i18n="prev_sub"></p>
  <div class="preview-wrap">
    <div class="preview-bar">
      <div class="dot-row"><div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div></div>
      <div class="preview-url">app.lexis.legal/dashboard</div>
    </div>
    <div class="preview-body">
      <div class="p-sidebar">
        <div class="p-logo">LEXIS</div>
        <div style="padding:12px 0">
          <div class="p-nav-item act" data-i18n="pn_clients"></div>
          <div class="p-nav-item" data-i18n="pn_warnings"></div>
          <div class="p-nav-item" data-i18n="pn_cases"></div>
          <div class="p-nav-item" data-i18n="pn_urgent"></div>
        </div>
      </div>
      <div class="p-main">
        <div class="p-grid">

(function anim(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(anim)})();
document.querySelectorAll('a,button,.feature,.testi-card').forEach(el=>{

document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
