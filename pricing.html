<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexis — Fiyatlandırma</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0b0d;--surface:#111316;--surface2:#191c22;--border:#242830;--accent:#c9a84c;--accent2:#e8c97a;--text:#ede9e0;--muted:#6b6f7a;--danger:#e05555;--ok:#4caf82}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:1000;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");opacity:.4}
nav{position:sticky;top:0;z-index:500;padding:0 48px;height:68px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,11,13,.9);border-bottom:1px solid var(--border);backdrop-filter:blur(16px)}
.nav-logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--accent);letter-spacing:1.5px;font-weight:700;text-decoration:none}
.nav-links{display:flex;gap:32px;align-items:center}
.nav-links a{color:var(--muted);font-size:13px;text-decoration:none;letter-spacing:.5px;font-family:'DM Mono',monospace;transition:color .2s}
.nav-links a:hover{color:var(--text)}
.nav-right{display:flex;gap:10px;align-items:center}
.lang-toggle{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.lang-btn{padding:5px 13px;font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s;letter-spacing:.5px}
.lang-btn.active{background:var(--accent);color:#0a0b0d;font-weight:600}
.btn{padding:9px 20px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#0a0b0d;font-weight:600}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:7px 14px;font-size:12px}
/* Hero */
.hero{padding:100px 48px 60px;text-align:center;position:relative;overflow:hidden}
.hero-glow{position:absolute;top:0;left:50%;transform:translateX(-50%);width:700px;height:350px;background:radial-gradient(ellipse,rgba(201,168,76,.08),transparent 70%);pointer-events:none}
.hero-tag{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:2px;margin-bottom:20px}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(36px,5vw,64px);font-weight:900;line-height:1.1;margin-bottom:20px;position:relative;z-index:1}
.hero-title em{font-style:italic;color:var(--accent)}
.hero-sub{font-size:16px;color:var(--muted);margin-bottom:40px;font-weight:300;position:relative;z-index:1}
/* Billing toggle */
.billing-toggle{display:inline-flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 16px;position:relative;z-index:1}
.billing-toggle span{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);cursor:pointer;transition:color .2s;letter-spacing:.5px}
.billing-toggle span.active{color:var(--text)}
.toggle-switch{width:40px;height:22px;background:var(--border);border-radius:11px;cursor:pointer;position:relative;transition:background .2s}
.toggle-switch.on{background:var(--accent)}
.toggle-knob{position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle-switch.on .toggle-knob{transform:translateX(18px)}
.save-badge{background:rgba(76,175,130,.15);color:var(--ok);border:1px solid rgba(76,175,130,.3);border-radius:10px;padding:2px 8px;font-size:10px;font-family:'DM Mono',monospace}
/* Plans */
.plans-section{padding:40px 48px 80px;max-width:1160px;margin:0 auto}
.plans-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.plan-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:36px;position:relative;transition:all .2s;display:flex;flex-direction:column}
.plan-card:hover{border-color:rgba(201,168,76,.3);transform:translateY(-2px);box-shadow:0 20px 60px rgba(0,0,0,.4)}
.plan-card.featured{border-color:var(--accent);background:linear-gradient(160deg,rgba(201,168,76,.06),var(--surface) 60%);box-shadow:0 0 60px rgba(201,168,76,.1)}
.plan-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--accent);color:#0a0b0d;padding:4px 16px;border-radius:20px;font-size:10px;font-family:'DM Mono',monospace;font-weight:700;letter-spacing:1px;white-space:nowrap}
.plan-name{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
.plan-price{display:flex;align-items:baseline;gap:4px;margin-bottom:8px}
.price-amount{font-family:'Playfair Display',serif;font-size:52px;font-weight:900;line-height:1}
.price-currency{font-size:20px;font-weight:600;color:var(--muted);margin-bottom:4px}
.price-period{font-size:13px;color:var(--muted);font-family:'DM Mono',monospace}
.plan-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:28px;font-weight:300;flex:0}
.plan-divider{height:1px;background:var(--border);margin-bottom:24px}
.plan-features{flex:1;display:flex;flex-direction:column;gap:10px;margin-bottom:32px}
.feat-row{display:flex;align-items:center;gap:10px;font-size:13px}
.feat-row .check{color:var(--ok);font-size:14px;flex-shrink:0;width:16px}
.feat-row .cross{color:var(--border);font-size:14px;flex-shrink:0;width:16px}
.feat-row span{color:var(--muted)}
.feat-row .feat-val{color:var(--accent);font-family:'DM Mono',monospace;font-size:11px}
.plan-cta{width:100%;padding:13px;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:all .2s;border:none;letter-spacing:.3px}
.cta-primary{background:var(--accent);color:#0a0b0d}
.cta-primary:hover{background:var(--accent2)}
.cta-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.cta-outline:hover{border-color:var(--accent);color:var(--accent)}
/* Compare */
.compare-section{padding:0 48px 60px;max-width:1160px;margin:0 auto}
.compare-toggle{text-align:center;margin-bottom:32px}
.compare-toggle a{color:var(--accent);font-size:13px;text-decoration:none;font-family:'DM Mono',monospace;letter-spacing:.5px;cursor:pointer;transition:opacity .2s}
.compare-toggle a:hover{opacity:.7}
.compare-table{display:none;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.compare-table.show{display:block}
.ct-header{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;background:var(--surface);border-bottom:1px solid var(--border)}
.ct-col{padding:14px 20px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:center;letter-spacing:.5px;text-transform:uppercase}
.ct-col:first-child{text-align:left}
.ct-section{background:var(--surface2);padding:10px 20px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.ct-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;border-bottom:1px solid var(--border);transition:background .15s}
.ct-row:last-child{border:none}
.ct-row:hover{background:rgba(201,168,76,.02)}
.ct-cell{padding:13px 20px;font-size:13px;text-align:center;display:flex;align-items:center;justify-content:center}
.ct-cell:first-child{text-align:left;justify-content:flex-start;font-size:13px;color:var(--muted)}
.ct-check{color:var(--ok)}.ct-cross{color:var(--border);font-size:16px}
.ct-val{color:var(--accent);font-family:'DM Mono',monospace;font-size:11px}
/* FAQ */
.faq-section{padding:40px 48px 80px;max-width:800px;margin:0 auto}
.faq-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;text-align:center;margin-bottom:40px}
.faq-item{border-bottom:1px solid var(--border);overflow:hidden}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:20px 0;cursor:pointer;font-size:15px;font-weight:500;transition:color .2s}
.faq-q:hover{color:var(--accent)}
.faq-arrow{font-size:18px;color:var(--muted);transition:transform .25s;flex-shrink:0}
.faq-item.open .faq-arrow{transform:rotate(180deg)}
.faq-a{font-size:14px;color:var(--muted);line-height:1.7;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s;font-weight:300}
.faq-item.open .faq-a{max-height:200px;padding-bottom:20px}
/* Trust */
.trust-strip{padding:32px 48px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface);display:flex;justify-content:center;align-items:center;gap:48px;flex-wrap:wrap}
.trust-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.3px}
.trust-icon{font-size:18px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:900;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(6px)}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:560px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;animation:slideUp .3s ease;position:relative}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-box::-webkit-scrollbar{width:4px}
.modal-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.modal-header{padding:28px 32px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-header h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;transition:color .2s;padding:4px}
.modal-close:hover{color:var(--text)}
.modal-body{padding:28px 32px;flex:1}
/* Step indicator */
.step-indicator{display:flex;align-items:center;gap:0;margin-bottom:32px}
.si-step{display:flex;flex-direction:column;align-items:center;flex:1;gap:6px}
.si-circle{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);transition:all .25s;background:var(--bg)}
.si-step.done .si-circle{background:var(--ok);border-color:var(--ok);color:#fff}
.si-step.active .si-circle{background:var(--accent);border-color:var(--accent);color:#0a0b0d;font-weight:700}
.si-label{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.5px;text-align:center}
.si-step.active .si-label{color:var(--accent)}
.si-line{flex:1;height:1px;background:var(--border);margin-top:-20px;z-index:-1}
.si-line.done{background:var(--ok)}
/* Form fields */
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:.5px;margin-bottom:8px}
.field input,.field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s,box-shadow .2s}
.field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.field input::placeholder{color:var(--muted)}
.field select option{background:var(--surface2)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-error{font-size:11px;color:var(--danger);margin-top:5px;display:none}
.field-error.show{display:block}
/* Order summary */
.order-summary{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:22px}
.os-plan{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.os-plan-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700}
.os-plan-per{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
.os-rows{display:flex;flex-direction:column;gap:7px;border-top:1px solid var(--border);padding-top:10px;margin-top:10px}
.os-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
.os-row.total{color:var(--text);font-weight:700;font-size:14px;border-top:1px solid var(--border);padding-top:8px;margin-top:4px}
.os-trial{font-size:11px;color:var(--ok);margin-top:6px;font-family:'DM Mono',monospace}
/* Promo */
.promo-row{display:flex;gap:8px;margin-bottom:18px}
.promo-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;font-family:'DM Mono',monospace;outline:none;transition:border .2s}
.promo-row input:focus{border-color:var(--accent)}
.promo-row input::placeholder{color:var(--muted)}
.promo-row button{padding:10px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;white-space:nowrap;transition:all .2s}
.promo-row button:hover{border-color:var(--accent);color:var(--accent)}
.promo-msg{font-size:11px;font-family:'DM Mono',monospace;margin-top:-12px;margin-bottom:14px;padding:6px 10px;border-radius:5px;display:none}
.promo-msg.ok{display:block;background:rgba(76,175,130,.1);color:var(--ok);border:1px solid rgba(76,175,130,.2)}
.promo-msg.err{display:block;background:rgba(224,85,85,.1);color:var(--danger);border:1px solid rgba(224,85,85,.2)}
/* Card format */
.card-icons{display:flex;gap:8px;margin-bottom:14px;align-items:center}
.card-icon{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:5px 9px;font-size:12px;font-family:'DM Mono',monospace;color:var(--muted)}
/* Submit button */
.pay-btn{width:100%;padding:14px;background:var(--accent);color:#0a0b0d;border:none;border-radius:8px;font-size:15px;font-family:'DM Sans',sans-serif;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
.pay-btn:hover{background:var(--accent2)}
.pay-btn:disabled{opacity:.6;cursor:not-allowed}
.sec-note{text-align:center;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:10px;letter-spacing:.3px}
.modal-back{background:none;border:1px solid var(--border);border-radius:6px;padding:7px 14px;color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;transition:all .2s;margin-bottom:20px}
.modal-back:hover{border-color:var(--accent);color:var(--accent)}
/* Success */
.success-screen{text-align:center;padding:20px 0}
.success-icon{font-size:56px;display:block;margin-bottom:20px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.success-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:10px}
.success-sub{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.6}
.success-details{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:18px;text-align:left;display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.sd-row{display:flex;justify-content:space-between;font-size:12px;font-family:'DM Mono',monospace}
.sd-row span:first-child{color:var(--muted)}
.sd-row span:last-child{color:var(--text);font-weight:500}
.spinner{width:18px;height:18px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-w{display:inline-flex;align-items:center;gap:8px}
/* Responsive */
@media(max-width:900px){.plans-grid{grid-template-columns:1fr}.ct-header,.ct-row{grid-template-columns:2fr 1fr 1fr 1fr;font-size:11px}.trust-strip{gap:24px}}
@media(max-width:640px){nav{padding:0 16px}.nav-links{display:none}.hero{padding:80px 20px 40px}.plans-section,.compare-section,.faq-section{padding-left:20px;padding-right:20px}.modal-box{width:calc(100vw - 32px)}.modal-header,.modal-body{padding:20px}.trust-strip{flex-direction:column;gap:16px}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">LEXIS</a>
  <div class="nav-links">
    <a href="index.html#features" data-i18n="nav_features"></a>
    <a href="index.html#how" data-i18n="nav_how"></a>
    <a href="pricing.html" data-i18n="nav_pricing"></a>
  </div>
  <div class="nav-right">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-tr" onclick="setLang('tr')">TR</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <a href="login.html" class="btn btn-ghost" data-i18n="nav_signin"></a>
    <a href="login.html" class="btn btn-primary" data-i18n="nav_getstarted"></a>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-glow"></div>
  <div class="hero-tag" data-i18n="price_tag"></div>
  <h1 class="hero-title"><span data-i18n="price_h1"></span><br><em data-i18n="price_h2"></em></h1>
  <p class="hero-sub" data-i18n="price_sub"></p>
  <div class="billing-toggle">
    <span id="lbl-monthly" class="active" onclick="setBilling('monthly')" data-i18n="billing_monthly"></span>
    <div class="toggle-switch" id="billing-switch" onclick="toggleBilling()"><div class="toggle-knob"></div></div>
    <span id="lbl-annual" onclick="setBilling('annual')" data-i18n="billing_annual"></span>
    <span class="save-badge" data-i18n="save_badge"></span>
  </div>
</section>

<!-- Plans -->
<div class="plans-section">
  <div class="plans-grid">
    <!-- Solo -->
    <div class="plan-card">
      <div class="plan-name">Solo</div>
      <div class="plan-price">
        <span class="price-currency">$</span>
        <span class="price-amount">0</span>
        <span class="price-period" data-i18n="per_month"></span>
      </div>
      <p class="plan-desc" data-i18n="solo_desc"></p>
      <div class="plan-divider"></div>
      <div class="plan-features">
        <div class="feat-row"><span class="check">✓</span><span><span class="feat-val" data-i18n="solo_clients"></span> <span data-i18n="feat_clients"></span></span></div>
        <div class="feat-row"><span class="check">✓</span><span><span class="feat-val" data-i18n="solo_cases"></span> <span data-i18n="feat_cases"></span></span></div>
        <div class="feat-row"><span class="check">✓</span><span data-i18n="feat_basic_warn"></span></div>
        <div class="feat-row"><span class="check">✓</span><span data-i18n="feat_timeline"></span></div>
        <div class="feat-row"><span class="check">✓</span><span data-i18n="feat_file_upload"></span></div>
        <div class="feat-row"><span class="cross">✕</span><span data-i18n="feat_subcases"></span></div>
        <div class="feat-row"><span class="cross">✕</span><span data-i18n="feat_priority"></span></div>
        <div class="feat-row"><span class="cross">✕</span><span data-i18n="feat_team"></span></div>
      </div>
      <button class="plan-cta cta-outline" onclick="openPayment('Solo',0)" data-i18n="solo_cta"></button>
    </div>
    <!-- Pro -->
    <div class="plan-card featured">
      <div class="plan-badge" data-i18n="most_popular"></div>
      <div class="plan-name">Pro</div>
      <div class="plan-price">
        <span class="price-currency">$</span>
        <span class="price-amount" id="pro-price">49</span>
        <span class="price-period" data-i18n="per_month"></span>
      </div>
      <p class="plan-desc" data-i18n="pro_desc"></p>
      <div class="plan-divider"></div>
      <div class="plan-features">
        <div class="feat-row"><span class="check">✓</span><span data-i18n="feat_unlimited_clients"></span></div>
        <div class="feat-row"><span class="check">✓</span><span data-i18n="feat_unlimited_cases"></span></div>

// ── setLang ──
function setLang(l){
  lang=l; localStorage.setItem('lexis_lang',l);
  document.documentElement.lang=l;
  document.title=T[l].title;
  document.getElementById('btn-tr').classList.toggle('active',l==='tr');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  const t=T[l];
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(t[k]!==undefined) el.textContent=t[k];
  });
  buildFaq();
  // re-render modal if open
  if(document.getElementById('modal-overlay').classList.contains('show')) renderPayStep();
}

// ── Billing toggle ──
function setBilling(m){
  billingMode=m;
  document.getElementById('lbl-monthly').classList.toggle('active',m==='monthly');
  document.getElementById('lbl-annual').classList.toggle('active',m==='annual');
  document.getElementById('billing-switch').classList.toggle('on',m==='annual');
  document.getElementById('pro-price').textContent=prices.Pro[m];
  document.getElementById('firm-price').textContent=prices.Firm[m];
}
function toggleBilling(){ setBilling(billingMode==='monthly'?'annual':'monthly'); }

// ── Compare table ──
function toggleCompare(){
  compareOpen=!compareOpen;
  document.getElementById('compare-table').classList.toggle('show',compareOpen);
  document.getElementById('compare-link').textContent=compareOpen?T[lang].compare_hide:T[lang].compare_show;
}

    <div class="faq-item" id="faq-${i}">
      <div class="faq-q" onclick="toggleFaq(${i})">${f.q}<span class="faq-arrow">⌄</span></div>
      <div class="faq-a">${f.a}</div>
    </div>`).join('');
}
function toggleFaq(i){
  document.querySelectorAll('.faq-item').forEach((el,j)=>el.classList.toggle('open',j===i&&!el.classList.contains('open')));
}

// ── Modal ──
function openPayment(plan, price){
  selectedPlan=plan; selectedPrice=price; payStep=1; payData={}; promoApplied=false;
  document.getElementById('modal-overlay').classList.add('show');
  renderPayStep();
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('show'); }
function handleOverlayClick(e){ if(e.target===document.getElementById('modal-overlay')) closeModal(); }

function orderSummaryHTML(){
  const t=T[lang];
  if(selectedPrice===0) return `<div class="order-summary"><div class="os-plan"><div><div class="os-plan-name">${selectedPlan}</div><div class="os-plan-per">${t.free_plan}</div></div></div></div>`;
  const sub=selectedPrice;
  const disc=promoApplied?Math.round(sub*.1):0;
  const taxable=sub-disc;
  const tax=Math.round(taxable*.18*100)/100;
  const total=(taxable+tax).toFixed(2);
  const period=T[lang].per_month;
  return `<div class="order-summary">
    <div class="os-plan"><div><div class="os-plan-name">${selectedPlan}</div><div class="os-plan-per">$${selectedPrice} ${period}</div></div></div>
    <div class="os-rows">
      <div class="os-row"><span>${t.os_subtotal}</span><span>$${sub.toFixed(2)}</span></div>
      ${promoApplied?`<div class="os-row" style="color:var(--ok)"><span>${t.os_discount}</span><span>-$${disc.toFixed(2)}</span></div>`:''}
      <div class="os-row"><span>${t.os_tax}</span><span>$${tax}</span></div>
      <div class="os-row total"><span>${t.os_total}</span><span>$${total}</span></div>
    </div>
    <div class="os-trial">★ ${t.os_trial}</div>
  </div>`;
}

function stepIndicatorHTML(){
  const t=T[lang];
  const steps=[t.step_account, t.step_billing, t.step_payment];
  return `<div class="step-indicator">
    ${steps.map((s,i)=>{
      const n=i+1;
      const done=n<payStep, active=n===payStep;
      return `${i>0?`<div class="si-line${n<=payStep?' done':''}"></div>`:''}
      <div class="si-step${done?' done':active?' active':''}">
        <div class="si-circle">${done?'✓':n}</div>
        <div class="si-label">${s}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function renderPayStep(){
  const t=T[lang];
  const body=document.getElementById('modal-body');
  document.getElementById('modal-title').textContent=t.checkout_title;

  if(payStep===0){
    // Success
    const isFree=selectedPrice===0;
    const trialEnd=new Date(); trialEnd.setDate(trialEnd.getDate()+14);
    const firstBill=new Date(); firstBill.setDate(firstBill.getDate()+14);
    const fmt=d=>d.toLocaleDateString(lang==='tr'?'tr-TR':'en-US',{day:'numeric',month:'long',year:'numeric'});
    body.innerHTML=`<div class="success-screen">
      <span class="success-icon">${t.success_icon}</span>
      <h2 class="success-title">${t.success_title}</h2>
      <p class="success-sub">${isFree?t.success_sub_solo:t.success_sub_paid}</p>
      <div class="success-details">
        <div class="sd-row"><span>${t.success_plan}</span><span>${selectedPlan}</span></div>
        ${!isFree?`<div class="sd-row"><span>${t.success_trial_ends}</span><span>${fmt(trialEnd)}</span></div>
        <div class="sd-row"><span>${t.success_billing}</span><span>$${(selectedPrice*1.18).toFixed(2)}</span></div>`:''}
        <div class="sd-row"><span>${t.success_email}</span><span>${payData.email||'—'}</span></div>
      </div>
      <button class="pay-btn" onclick="window.location.href='lawyer-dashboard.html'">${t.btn_dashboard}</button>
      ${!isFree?`<div class="sec-note" style="margin-top:14px">${t.success_email_note}</div>`:''}
    </div>`;
    return;
  }

  if(selectedPrice===0){
    // Solo → skip to success
    payStep=0; payData.email=payData.email||''; renderPayStep(); return;
  }

  if(payStep===1){
    body.innerHTML=stepIndicatorHTML()+orderSummaryHTML()+`
    <div class="field-row">
      <div class="field"><label>${t.field_fname}</label><input id="p-fname" placeholder="${t.ph_fname}"></div>
      <div class="field"><label>${t.field_lname}</label><input id="p-lname" placeholder="${t.ph_lname}"></div>
    </div>
    <div class="field"><label>${t.field_email}</label><input id="p-email" type="email" placeholder="${t.ph_email}"></div>
    <div class="field"><label>${t.field_firm}</label><input id="p-firm" placeholder="${t.ph_firm}"></div>
    <button class="pay-btn" onclick="step1Next()">${t.btn_continue}</button>`;
    if(payData.fname) document.getElementById('p-fname').value=payData.fname;
    if(payData.lname) document.getElementById('p-lname').value=payData.lname;
    if(payData.email) document.getElementById('p-email').value=payData.email;
    if(payData.firm)  document.getElementById('p-firm').value=payData.firm;
  } else if(payStep===2){
    const countryOpts=T[lang].countries.map(c=>`<option>${c}</option>`).join('');
    body.innerHTML=stepIndicatorHTML()+orderSummaryHTML()+`
    <button class="modal-back" onclick="goPayStep(1)">${t.btn_back}</button>
    <div class="field"><label>${t.field_country}</label><select id="p-country">${countryOpts}</select></div>
    <div class="field"><label>${t.field_address}</label><input id="p-address" placeholder="${t.ph_address}"></div>
    <div class="field-row">
      <div class="field"><label>${t.field_city}</label><input id="p-city" placeholder="${t.ph_city}"></div>
      <div class="field"><label>${t.field_postal}</label><input id="p-postal" placeholder="${t.ph_postal}"></div>
    </div>
    <div class="field"><label>${t.promo_label}</label>
      <div class="promo-row"><input id="p-promo" placeholder="${t.ph_promo}"><button onclick="applyPromo()">${t.btn_apply}</button></div>
      <div class="promo-msg" id="promo-msg"></div>
    </div>
    <button class="pay-btn" onclick="step2Next()">${t.btn_to_payment}</button>`;
    if(payData.country) document.getElementById('p-country').value=payData.country;
    if(payData.address) document.getElementById('p-address').value=payData.address;
    if(payData.city)    document.getElementById('p-city').value=payData.city;
    if(payData.postal)  document.getElementById('p-postal').value=payData.postal;
    if(promoApplied){const pm=document.getElementById('promo-msg'); pm.textContent=t.promo_ok; pm.className='promo-msg ok';}
  } else if(payStep===3){
    const disc=promoApplied?Math.round(selectedPrice*.1):0;
    const taxable=selectedPrice-disc;
    const total=((taxable)*1.18).toFixed(2);
    body.innerHTML=stepIndicatorHTML()+orderSummaryHTML()+`
    <button class="modal-back" onclick="goPayStep(2)">${t.btn_back}</button>
    <div class="card-icons">
      <span class="card-icon">VISA</span>
      <span class="card-icon">MC</span>
      <span class="card-icon">AMEX</span>
    </div>
    <div class="field"><label>${t.field_cardholder}</label><input id="p-holder" placeholder="${t.ph_cardholder}" style="text-transform:uppercase"></div>
    <div class="field"><label>${t.field_cardnum}</label><input id="p-cardnum" placeholder="${t.ph_cardnum}" maxlength="19" oninput="formatCard(this)"></div>
    <div class="field-row">
      <div class="field"><label>${t.field_expiry}</label><input id="p-expiry" placeholder="${t.ph_expiry}" maxlength="5" oninput="formatExpiry(this)"></div>
      <div class="field"><label>${t.field_cvv}</label><input id="p-cvv" placeholder="${t.ph_cvv}" type="password" maxlength="4"></div>
    </div>
    <button class="pay-btn" id="pay-final-btn" onclick="finalPay()">🔒 ${t.os_total}: $${total}</button>
    <div class="sec-note">${t.sec_note}</div>`;
  }
}

function step1Next(){
  const t=T[lang];
  const fname=document.getElementById('p-fname').value.trim();
  const lname=document.getElementById('p-lname').value.trim();
  const email=document.getElementById('p-email').value.trim();
  const firm=document.getElementById('p-firm').value.trim();
  if(!fname||!lname){alert(t.err_name);return;}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){alert(t.err_email);return;}
  if(!firm){alert(t.err_firm);return;}
  payData={...payData,fname,lname,email,firm};
  goPayStep(2);
}
function step2Next(){
  const t=T[lang];
  const country=document.getElementById('p-country').value;
  const address=document.getElementById('p-address').value.trim();
  const city=document.getElementById('p-city').value.trim();
  const postal=document.getElementById('p-postal').value.trim();
  if(!country){alert(t.err_country);return;}
  if(!address){alert(t.err_address);return;}
  if(!city){alert(t.err_city);return;}
  payData={...payData,country,address,city,postal};
  goPayStep(3);
}
function goPayStep(s){ payStep=s; renderPayStep(); document.getElementById('modal-box').scrollTop=0; }

function applyPromo(){
  const t=T[lang];
  const code=document.getElementById('p-promo').value.trim().toUpperCase();
  const msg=document.getElementById('promo-msg');
  if(code==='LEXIS10'){ promoApplied=true; msg.textContent=t.promo_ok; msg.className='promo-msg ok'; }
  else { promoApplied=false; msg.textContent=t.promo_err; msg.className='promo-msg err'; }
  // Refresh summary
  const os=document.getElementById('modal-body').querySelector('.order-summary');
  if(os){ const dummy=document.createElement('div'); dummy.innerHTML=orderSummaryHTML(); os.replaceWith(dummy.firstElementChild); }
}

function formatCard(el){
  let v=el.value.replace(/\D/g,'').slice(0,16);
  el.value=v.match(/.{1,4}/g)?.join(' ')||v;
}
function formatExpiry(el){
  let v=el.value.replace(/\D/g,'').slice(0,4);
  if(v.length>=3) v=v.slice(0,2)+'/'+v.slice(2);
  el.value=v;
}

function finalPay(){
  const t=T[lang];
  const holder=document.getElementById('p-holder').value.trim();
  const cardnum=document.getElementById('p-cardnum').value.replace(/\s/g,'');
  const expiry=document.getElementById('p-expiry').value.trim();
  const cvv=document.getElementById('p-cvv').value.trim();
  if(!holder){alert(t.err_cardholder);return;}
  if(cardnum.length<15){alert(t.err_cardnum);return;}
  if(!expiry||expiry.length<5){alert(t.err_expiry);return;}
  if(!cvv||cvv.length<3){alert(t.err_cvv);return;}
  const btn=document.getElementById('pay-final-btn');
  btn.disabled=true;
  btn.innerHTML=`<div class="spinner-w"><div class="spinner"></div><span>${lang==='tr'?'İşleniyor…':'Processing…'}</span></div>`;
  setTimeout(()=>{ payStep=0; renderPayStep(); },2000);
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

// Init
buildFaq();
setLang(lang);
</script>
</body>
</html>
